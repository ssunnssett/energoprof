<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Схема базы данных - Energoprof</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Arial', sans-serif;
            background: #f5f5f5;
            padding: 40px 20px;
        }

        .container {
            background: white;
            padding: 40px;
            max-width: 1600px;
            margin: 0 auto;
        }

        h1 {
            text-align: center;
            color: #333;
            margin-bottom: 10px;
            font-size: 2em;
            font-weight: 700;
        }

        .subtitle {
            text-align: center;
            color: #666;
            margin-bottom: 50px;
            font-size: 1em;
        }

        svg {
            width: 100%;
            height: auto;
            display: block;
        }

        .table-box {
            fill: white;
            stroke: #333;
            stroke-width: 2;
        }

        .table-header {
            fill: #333;
        }

        .table-title {
            fill: white;
            font-size: 14px;
            font-weight: bold;
            text-anchor: middle;
        }

        .field-text {
            font-size: 11px;
            fill: #333;
        }

        .field-type {
            font-size: 10px;
            fill: #666;
        }

        .pk-badge, .fk-badge {
            font-size: 9px;
            font-weight: bold;
        }

        .pk-badge {
            fill: white;
        }

        .fk-badge {
            fill: white;
        }

        .pk-bg {
            fill: #333;
        }

        .fk-bg {
            fill: #666;
        }

        .pk-row {
            fill: #f0f0f0;
        }

        .fk-row {
            fill: #f8f8f8;
        }

        .separator {
            stroke: #ddd;
            stroke-width: 1;
        }

        .relation-line {
            stroke: #333;
            stroke-width: 2;
            fill: none;
        }

        .relation-label {
            font-size: 11px;
            fill: #666;
            font-weight: bold;
        }

        .relation-circle {
            fill: white;
            stroke: #333;
            stroke-width: 2;
        }

        .relation-arrow {
            fill: #333;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>Схема базы данных</h1>
        <p class="subtitle">Energoprof - SQLite Database Schema</p>
        
        <svg viewBox="0 0 1500 1000" xmlns="http://www.w3.org/2000/svg">
            <!-- USERS Table -->
            <g id="users-table">
                <rect class="table-box" x="50" y="50" width="200" height="220" rx="5"/>
                <rect class="table-header" x="50" y="50" width="200" height="35" rx="5"/>
                <text class="table-title" x="150" y="72">USERS</text>
                
                <!-- Fields -->
                <rect class="pk-row" x="50" y="85" width="200" height="25"/>
                <text class="field-text" x="60" y="101">id</text>
                <rect class="pk-bg" x="85" y="92" width="20" height="12" rx="2"/>
                <text class="pk-badge" x="95" y="101">PK</text>
                <text class="field-type" x="180" y="101" text-anchor="end">Integer</text>
                
                <line class="separator" x1="50" y1="110" x2="250" y2="110"/>
                <text class="field-text" x="60" y="126">login</text>
                <text class="field-type" x="180" y="126" text-anchor="end">String</text>
                
                <line class="separator" x1="50" y1="135" x2="250" y2="135"/>
                <text class="field-text" x="60" y="151">password</text>
                <text class="field-type" x="180" y="151" text-anchor="end">String</text>
                
                <line class="separator" x1="50" y1="160" x2="250" y2="160"/>
                <text class="field-text" x="60" y="176">first_name</text>
                <text class="field-type" x="180" y="176" text-anchor="end">String</text>
                
                <line class="separator" x1="50" y1="185" x2="250" y2="185"/>
                <text class="field-text" x="60" y="201">last_name</text>
                <text class="field-type" x="180" y="201" text-anchor="end">String</text>
                
                <line class="separator" x1="50" y1="210" x2="250" y2="210"/>
                <text class="field-text" x="60" y="226">phone</text>
                <text class="field-type" x="180" y="226" text-anchor="end">String</text>
                
                <line class="separator" x1="50" y1="235" x2="250" y2="235"/>
                <text class="field-text" x="60" y="251">role</text>
                <text class="field-type" x="180" y="251" text-anchor="end">String</text>
            </g>

            <!-- PRODUCTS Table -->
            <g id="products-table">
                <rect class="table-box" x="350" y="50" width="200" height="270" rx="5"/>
                <rect class="table-header" x="350" y="50" width="200" height="35" rx="5"/>
                <text class="table-title" x="450" y="72">PRODUCTS</text>
                
                <rect class="pk-row" x="350" y="85" width="200" height="25"/>
                <text class="field-text" x="360" y="101">id</text>
                <rect class="pk-bg" x="385" y="92" width="20" height="12" rx="2"/>
                <text class="pk-badge" x="395" y="101">PK</text>
                <text class="field-type" x="480" y="101" text-anchor="end">Integer</text>
                
                <line class="separator" x1="350" y1="110" x2="550" y2="110"/>
                <text class="field-text" x="360" y="126">name</text>
                <text class="field-type" x="480" y="126" text-anchor="end">String</text>
                
                <line class="separator" x1="350" y1="135" x2="550" y2="135"/>
                <text class="field-text" x="360" y="151">description</text>
                <text class="field-type" x="480" y="151" text-anchor="end">String</text>
                
                <line class="separator" x1="350" y1="160" x2="550" y2="160"/>
                <text class="field-text" x="360" y="176">price</text>
                <text class="field-type" x="480" y="176" text-anchor="end">Float</text>
                
                <line class="separator" x1="350" y1="185" x2="550" y2="185"/>
                <text class="field-text" x="360" y="201">power</text>
                <text class="field-type" x="480" y="201" text-anchor="end">Float</text>
                
                <line class="separator" x1="350" y1="210" x2="550" y2="210"/>
                <text class="field-text" x="360" y="226">fuel_type</text>
                <text class="field-type" x="480" y="226" text-anchor="end">String</text>
                
                <line class="separator" x1="350" y1="235" x2="550" y2="235"/>
                <text class="field-text" x="360" y="251">image</text>
                <text class="field-type" x="480" y="251" text-anchor="end">String</text>
                
                <line class="separator" x1="350" y1="260" x2="550" y2="260"/>
                <text class="field-text" x="360" y="276">stock</text>
                <text class="field-type" x="480" y="276" text-anchor="end">Integer</text>
            </g>

            <!-- APPLICATIONS Table -->
            <g id="applications-table">
                <rect class="table-box" x="650" y="50" width="200" height="220" rx="5"/>
                <rect class="table-header" x="650" y="50" width="200" height="35" rx="5"/>
                <text class="table-title" x="750" y="72">APPLICATIONS</text>
                
                <rect class="pk-row" x="650" y="85" width="200" height="25"/>
                <text class="field-text" x="660" y="101">id</text>
                <rect class="pk-bg" x="685" y="92" width="20" height="12" rx="2"/>
                <text class="pk-badge" x="695" y="101">PK</text>
                <text class="field-type" x="780" y="101" text-anchor="end">Integer</text>
                
                <line class="separator" x1="650" y1="110" x2="850" y2="110"/>
                <text class="field-text" x="660" y="126">name</text>
                <text class="field-type" x="780" y="126" text-anchor="end">String</text>
                
                <line class="separator" x1="650" y1="135" x2="850" y2="135"/>
                <text class="field-text" x="660" y="151">phone</text>
                <text class="field-type" x="780" y="151" text-anchor="end">String</text>
                
                <line class="separator" x1="650" y1="160" x2="850" y2="160"/>
                <text class="field-text" x="660" y="176">message</text>
                <text class="field-type" x="780" y="176" text-anchor="end">String</text>
                
                <line class="separator" x1="650" y1="185" x2="850" y2="185"/>
                <text class="field-text" x="660" y="201">product</text>
                <text class="field-type" x="780" y="201" text-anchor="end">String</text>
                
                <line class="separator" x1="650" y1="210" x2="850" y2="210"/>
                <text class="field-text" x="660" y="226">created_at</text>
                <text class="field-type" x="780" y="226" text-anchor="end">DateTime</text>
                
                <line class="separator" x1="650" y1="235" x2="850" y2="235"/>
                <text class="field-text" x="660" y="251">status</text>
                <text class="field-type" x="780" y="251" text-anchor="end">String</text>
            </g>

            <!-- ORDERS Table -->
            <g id="orders-table">
                <rect class="table-box" x="50" y="400" width="200" height="195" rx="5"/>
                <rect class="table-header" x="50" y="400" width="200" height="35" rx="5"/>
                <text class="table-title" x="150" y="422">ORDERS</text>
                
                <rect class="pk-row" x="50" y="435" width="200" height="25"/>
                <text class="field-text" x="60" y="451">id</text>
                <rect class="pk-bg" x="85" y="442" width="20" height="12" rx="2"/>
                <text class="pk-badge" x="95" y="451">PK</text>
                <text class="field-type" x="180" y="451" text-anchor="end">Integer</text>
                
                <line class="separator" x1="50" y1="460" x2="250" y2="460"/>
                <text class="field-text" x="60" y="476">customer_name</text>
                <text class="field-type" x="180" y="476" text-anchor="end">String</text>
                
                <line class="separator" x1="50" y1="485" x2="250" y2="485"/>
                <text class="field-text" x="60" y="501">phone</text>
                <text class="field-type" x="180" y="501" text-anchor="end">String</text>
                
                <line class="separator" x1="50" y1="510" x2="250" y2="510"/>
                <text class="field-text" x="60" y="526">total_price</text>
                <text class="field-type" x="180" y="526" text-anchor="end">Float</text>
                
                <line class="separator" x1="50" y1="535" x2="250" y2="535"/>
                <text class="field-text" x="60" y="551">status</text>
                <text class="field-type" x="180" y="551" text-anchor="end">String</text>
                
                <line class="separator" x1="50" y1="560" x2="250" y2="560"/>
                <text class="field-text" x="60" y="576">created_at</text>
                <text class="field-type" x="180" y="576" text-anchor="end">DateTime</text>
            </g>

            <!-- ORDER_ITEMS Table -->
            <g id="order-items-table">
                <rect class="table-box" x="350" y="400" width="200" height="145" rx="5"/>
                <rect class="table-header" x="350" y="400" width="200" height="35" rx="5"/>
                <text class="table-title" x="450" y="422">ORDER_ITEMS</text>
                
                <rect class="pk-row" x="350" y="435" width="200" height="25"/>
                <text class="field-text" x="360" y="451">id</text>
                <rect class="pk-bg" x="385" y="442" width="20" height="12" rx="2"/>
                <text class="pk-badge" x="395" y="451">PK</text>
                <text class="field-type" x="480" y="451" text-anchor="end">Integer</text>
                
                <line class="separator" x1="350" y1="460" x2="550" y2="460"/>
                <rect class="fk-row" x="350" y="460" width="200" height="25"/>
                <text class="field-text" x="360" y="476">order_id</text>
                <rect class="fk-bg" x="415" y="467" width="20" height="12" rx="2"/>
                <text class="fk-badge" x="425" y="476">FK</text>
                <text class="field-type" x="480" y="476" text-anchor="end">Integer</text>
                
                <line class="separator" x1="350" y1="485" x2="550" y2="485"/>
                <rect class="fk-row" x="350" y="485" width="200" height="25"/>
                <text class="field-text" x="360" y="501">product_id</text>
                <rect class="fk-bg" x="425" y="492" width="20" height="12" rx="2"/>
                <text class="fk-badge" x="435" y="501">FK</text>
                <text class="field-type" x="480" y="501" text-anchor="end">Integer</text>
                
                <line class="separator" x1="350" y1="510" x2="550" y2="510"/>
                <text class="field-text" x="360" y="526">quantity</text>
                <text class="field-type" x="480" y="526" text-anchor="end">Integer</text>
            </g>

            <!-- ADMIN_LOGS Table -->
            <g id="admin-logs-table">
                <rect class="table-box" x="50" y="700" width="200" height="220" rx="5"/>
                <rect class="table-header" x="50" y="700" width="200" height="35" rx="5"/>
                <text class="table-title" x="150" y="722">ADMIN_LOGS</text>
                
                <rect class="pk-row" x="50" y="735" width="200" height="25"/>
                <text class="field-text" x="60" y="751">id</text>
                <rect class="pk-bg" x="85" y="742" width="20" height="12" rx="2"/>
                <text class="pk-badge" x="95" y="751">PK</text>
                <text class="field-type" x="180" y="751" text-anchor="end">Integer</text>
                
                <line class="separator" x1="50" y1="760" x2="250" y2="760"/>
                <rect class="fk-row" x="50" y="760" width="200" height="25"/>
                <text class="field-text" x="60" y="776">user_id</text>
                <rect class="fk-bg" x="105" y="767" width="20" height="12" rx="2"/>
                <text class="fk-badge" x="115" y="776">FK</text>
                <text class="field-type" x="180" y="776" text-anchor="end">Integer</text>
                
                <line class="separator" x1="50" y1="785" x2="250" y2="785"/>
                <text class="field-text" x="60" y="801">action</text>
                <text class="field-type" x="180" y="801" text-anchor="end">String</text>
                
                <line class="separator" x1="50" y1="810" x2="250" y2="810"/>
                <text class="field-text" x="60" y="826">details</text>
                <text class="field-type" x="180" y="826" text-anchor="end">String</text>
                
                <line class="separator" x1="50" y1="835" x2="250" y2="835"/>
                <text class="field-text" x="60" y="851">before_state</text>
                <text class="field-type" x="180" y="851" text-anchor="end">String</text>
                
                <line class="separator" x1="50" y1="860" x2="250" y2="860"/>
                <text class="field-text" x="60" y="876">after_state</text>
                <text class="field-type" x="180" y="876" text-anchor="end">String</text>
                
                <line class="separator" x1="50" y1="885" x2="250" y2="885"/>
                <text class="field-text" x="60" y="901">timestamp</text>
                <text class="field-type" x="180" y="901" text-anchor="end">DateTime</text>
            </g>

            <!-- Relation: ORDERS -> ORDER_ITEMS (1:N) -->
            <path class="relation-line" d="M 250 497 L 350 472"/>
            <circle class="relation-circle" cx="250" cy="497" r="4"/>
            <polygon class="relation-arrow" points="350,472 342,468 342,476"/>
            <text class="relation-label" x="290" y="480">1:N</text>

            <!-- Relation: ORDER_ITEMS -> PRODUCTS (N:1) -->
            <path class="relation-line" d="M 450 400 L 450 320"/>
            <circle class="relation-circle" cx="450" cy="400" r="4"/>
            <polygon class="relation-arrow" points="450,320 446,328 454,328"/>
            <text class="relation-label" x="460" y="365">N:1</text>

            <!-- Relation: USERS -> ADMIN_LOGS (1:N) -->
            <path class="relation-line" d="M 150 270 L 150 700"/>
            <circle class="relation-circle" cx="150" cy="270" r="4"/>
            <polygon class="relation-arrow" points="150,700 146,692 154,692"/>
            <text class="relation-label" x="160" y="490">1:N</text>
        </svg>
    </div>
</body>
</html>
