<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <title>Макет - Логи действий</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;600;900&display=swap');
        body { background-color: #0f111a; color: white; font-family: 'Inter', sans-serif; overflow: hidden; }
        .glass { background: rgba(255, 255, 255, 0.05); backdrop-filter: blur(16px); border: 1px solid rgba(255, 255, 255, 0.1); border-radius: 24px; }
        .text-primary { color: #FF8C00; }
        .bg-primary { background-color: #FF8C00; }
        .bg-primary-10 { background-color: rgba(255, 140, 0, 0.1); }
    </style>
</head>
<body class="p-8 h-screen w-screen flex gap-8 box-border">
    <!-- Sidebar Mini -->
    <div class="glass w-20 p-6 flex flex-col items-center justify-between h-full shadow-2xl">
        <div class="text-primary font-black text-2xl">E</div>
    </div>

    <div class="flex-1 overflow-auto flex flex-col">
        <h1 class="text-4xl font-black uppercase tracking-tight mb-8">Логи действий</h1>

        <div class="glass p-2 shadow-2xl flex-1">
            <table class="w-full text-left border-separate border-spacing-y-2 px-6">
                <thead>
                    <tr class="text-gray-500 text-[10px] font-bold uppercase tracking-widest">
                        <th class="py-6 px-4 border-b border-white/5">Время</th>
                        <th class="py-6 px-4 border-b border-white/5">Администратор</th>
                        <th class="py-6 px-4 border-b border-white/5">Действие</th>
                        <th class="py-6 px-4 border-b border-white/5">Изменения</th>
                        <th class="py-6 px-4 border-b border-white/5 text-right">Контроль</th>
                    </tr>
                </thead>
                <tbody>
                    <!-- Row 1: Update -->
                    <tr class="bg-white/5 rounded-2xl group hover:bg-white/10 transition-all">
                        <td class="py-5 px-4 rounded-l-2xl">
                            <div class="font-bold text-sm text-white">15:30</div>
                            <div class="text-[10px] text-gray-500 font-medium">08.06.2026</div>
                        </td>
                        <td class="py-5 px-4">
                            <div class="flex items-center gap-3">
                                <div class="w-8 h-8 rounded-full bg-primary/20 flex items-center justify-center text-primary text-xs font-black">I</div>
                                <div>
                                    <div class="text-sm font-bold text-white">Ivan_Admin</div>
                                    <div class="text-[10px] text-gray-500 uppercase font-bold tracking-tight">ID: #4</div>
                                </div>
                            </div>
                        </td>
                        <td class="py-5 px-4">
                            <span class="px-4 py-1.5 rounded-full text-[10px] font-black uppercase tracking-widest border text-blue-500 bg-blue-500/10 border-blue-500/20">
                                Изменение товара
                            </span>
                        </td>
                        <td class="py-5 px-4 font-medium text-xs text-gray-400 max-w-md">
                            <div class="space-y-1">
                                <div class="flex items-center gap-2 text-[10px]">
                                    <span class="text-gray-500 font-bold uppercase tracking-tight w-16">Цена:</span>
                                    <span class="line-through opacity-50 text-red-400">45000</span>
                                    <span class="text-[#FF8C00]">→</span>
                                    <span class="text-white font-bold text-green-400">48000</span>
                                </div>
                            </div>
                        </td>
                        <td class="py-5 px-4 rounded-r-2xl text-right">
                            <button class="p-2.5 rounded-xl bg-purple-500/10 text-purple-400 border border-purple-500/20 hover:bg-purple-500 hover:text-white transition-all shadow-lg flex items-center gap-2 ml-auto">
                                <span class="text-[10px] font-bold uppercase tracking-widest">Откатить</span>
                            </button>
                        </td>
                    </tr>
                    
                    <!-- Row 2: Delete -->
                    <tr class="bg-white/5 rounded-2xl group hover:bg-white/10 transition-all mt-2">
                        <td class="py-5 px-4 rounded-l-2xl">
                            <div class="font-bold text-sm text-white">12:10</div>
                            <div class="text-[10px] text-gray-500 font-medium">08.06.2026</div>
                        </td>
                        <td class="py-5 px-4">
                            <div class="flex items-center gap-3">
                                <div class="w-8 h-8 rounded-full bg-primary/20 flex items-center justify-center text-primary text-xs font-black">A</div>
                                <div>
                                    <div class="text-sm font-bold text-white">AdminRoot</div>
                                    <div class="text-[10px] text-gray-500 uppercase font-bold tracking-tight">ID: #1</div>
                                </div>
                            </div>
                        </td>
                        <td class="py-5 px-4">
                            <span class="px-4 py-1.5 rounded-full text-[10px] font-black uppercase tracking-widest border text-red-500 bg-red-500/10 border-red-500/20">
                                Удаление товара
                            </span>
                        </td>
                        <td class="py-5 px-4 font-medium text-xs text-gray-400 max-w-md">
                            Товар "Генератор АД-200" успешно удален из базы.
                        </td>
                        <td class="py-5 px-4 rounded-r-2xl text-right">
                            <button class="p-2.5 rounded-xl bg-purple-500/10 text-purple-400 border border-purple-500/20 hover:bg-purple-500 hover:text-white transition-all shadow-lg flex items-center gap-2 ml-auto">
                                <span class="text-[10px] font-bold uppercase tracking-widest">Откатить</span>
                            </button>
                        </td>
                    </tr>
                </tbody>
            </table>
        </div>
    </div>
</body>
</html>
